name: guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check tracked files
        run: |
          FORBIDDEN_REGEX='\.(cs|csproj|sln|xaml|props|targets|go|mod|sum|h|hpp|c|cpp|py|js|ts|jsx|tsx|rb|java|kt|swift|rs|php|pl|sh|ps1|psm1|sql)$'
          OFFENDERS=$(git ls-files | grep -iE "$FORBIDDEN_REGEX" || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Unexpected file types detected:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK"
